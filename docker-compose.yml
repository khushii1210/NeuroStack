services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: neurostack
      POSTGRES_PASSWORD: neurostack
      POSTGRES_DB: neurostack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://neurostack:neurostack@postgres:5432/neurostack
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGIN: http://localhost,http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: